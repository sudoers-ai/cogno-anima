name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (pinned dev env + editable package)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          # Sibling transport libs (not yet on PyPI) from git so the runtime deps
          # resolve: cogno-synapse -> cogno-homeo. Install homeo first (synapse needs it).
          pip install "cogno-homeo @ git+https://github.com/sudoers-ai/cogno-homeo.git"
          pip install "cogno-synapse @ git+https://github.com/sudoers-ai/cogno-synapse.git"
          pip install -e . --no-deps

      - name: Lint (ruff)
        run: ruff check cogno_anima cognobench tests scripts

      - name: Type check (mypy)
        run: mypy

      - name: Unit tests (with coverage gate)
        # Integration tests need a live Ollama and are skipped in CI.
        run: pytest tests/unit -q --cov=cogno_anima --cov-report=term-missing --cov-fail-under=85
